<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLink - Login / Register</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 40px;
        }

        .auth-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            padding-bottom: 10px;
            position: relative;
        }

        .toggle-btn.active {
            color: var(--primary-color);
        }

        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
        }

        #registerForm {
            display: none;
        }
    </style>
</head>
<body style="background-color: #f1f5f9;">
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Med<span>Link</span></a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html" class="btn btn-accent">Login / Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container card">
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="toggleAuth('login')">Login</button>
                <button class="toggle-btn" onclick="toggleAuth('register')">Register</button>
            </div>

            <form id="loginForm" onsubmit="handleAuth(event, 'login')">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <form id="registerForm" onsubmit="handleAuth(event, 'register')">
                <div class="form-group">
                    <label for="fullName">Pharmacy Name / Full Name</label>
                    <input type="text" id="fullName" placeholder="Care Pharmacy" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-accent" style="width: 100%;">Create Account</button>
            </form>

            <p id="authMessage" style="margin-top: 20px; text-align: center; font-size: 0.9rem;"></p>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        function toggleAuth(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const btns = document.querySelectorAll('.toggle-btn');
            
            if (type === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }
    </script>
</body>
</html>
