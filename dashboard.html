<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLink - Pharmacy Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Med<span>Link</span></a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="dashboard.html" class="active">Pharmacy Portal</a></li>
                    <li><button class="btn btn-accent" onclick="logout()">Logout</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-link active">Inventory</a>
            <a href="#" class="sidebar-link">Orders</a>
            <a href="#" class="sidebar-link">Pharmacy Settings</a>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Manage Medicines</h2>
                <button class="btn btn-accent" onclick="openAddModal()">+ Add New Medicine</button>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="totalMedicines">12</span>
                    <p>Total Medicines</p>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="lowStock">3</span>
                    <p>Low Stock</p>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="outOfStock">1</span>
                    <p>Out of Stock</p>
                </div>
            </div>

            <div class="card">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid #e2e8f0; height: 50px;">
                            <th>Medicine Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <!-- Table rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Simple Add/Edit Modal (Pure CSS/JS overlay) -->
    <div id="medicineModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div class="card" style="max-width: 500px; width: 90%; position: relative; padding-top: 50px;">
            <button onclick="closeAddModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h3 style="margin-bottom: 20px;">Add Medicine</h3>
            <form id="medicineForm" onsubmit="handleMedicineSubmit(event)">
                <div class="form-group">
                    <label>Medicine Name</label>
                    <input type="text" id="medName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="medCategory" required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" id="medPrice" required>
                </div>
                <div class="form-group">
                    <label>Is Available?</label>
                    <select id="medAvailable" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-accent" style="width: 100%;">Save Medicine</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Specific UI helpers for dashboard
        function openAddModal() {
            document.getElementById('medicineModal').style.display = 'flex';
        }
        function closeAddModal() {
            document.getElementById('medicineModal').style.display = 'none';
        }
        
        // Populate table on load
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof renderInventory === 'function') {
                renderInventory();
            }
        });
    </script>
</body>
</html>
