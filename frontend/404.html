<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/favicon.ico" />
    <title>404 - Page Out of Stock | MedLink</title>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- globals -->
    <link rel="stylesheet" href="css/global.css" />
    <style>
      :root {
        --error-primary: #00a9e0;
        --error-secondary: #7c3aed;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top right, #f0f7ff, #ffffff);
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      .error-container {
        text-align: center;
        padding: 40px;
        max-width: 600px;
        width: 100%;
        position: relative;
        z-index: 10;
      }

      /* Animated Blobs */
      .blob {
        position: absolute;
        width: 300px;
        height: 300px;
        background: var(--error-primary);
        filter: blur(80px);
        opacity: 0.15;
        border-radius: 50%;
        z-index: -1;
      }
      .blob-1 { top: -100px; left: -100px; animation: float 8s infinite ease-in-out; }
      .blob-2 { bottom: -100px; right: -100px; background: var(--error-secondary); animation: float 10s infinite ease-in-out reverse; }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
      }

      .error-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 40px;
        padding: 60px 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      }

      .error-code {
        font-family: 'Outfit', sans-serif;
        font-size: 120px;
        font-weight: 800;
        line-height: 1;
        margin: 0;
        background: linear-gradient(135deg, var(--error-primary), var(--error-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -5px;
        margin-bottom: 20px;
        position: relative;
      }

      .floating-pill {
        position: absolute;
        font-size: 40px;
        color: var(--error-primary);
        top: -20px;
        right: 40px;
        animation: spin 6s infinite linear;
      }

      @keyframes spin {
        from { transform: rotate(0deg) translateY(0); }
        50% { transform: rotate(180deg) translateY(-20px); }
        to { transform: rotate(360deg) translateY(0); }
      }

      .error-title {
        font-family: 'Outfit', sans-serif;
        font-size: 2rem;
        color: var(--text-heading);
        margin-bottom: 15px;
        font-weight: 700;
      }

      .error-message {
        color: var(--text-muted);
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 40px;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 35px;
        background: var(--error-primary);
        color: white;
        text-decoration: none;
        border-radius: 100px;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 20px -5px rgba(0, 169, 224, 0.4);
      }

      .btn-back:hover {
        transform: scale(1.05) translateY(-3px);
        box-shadow: 0 15px 30px -5px rgba(0, 169, 224, 0.5);
      }

      .medlink-logo {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
      }

      /* Search animation */
      .search-box {
        margin: 20px auto 40px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--error-primary);
        font-size: 2rem;
        box-shadow: var(--shadow-md);
        position: relative;
      }

      .search-box::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px dashed var(--error-primary);
        animation: rotate 10s infinite linear;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @media (max-width: 480px) {
        .error-code { font-size: 80px; }
        .error-title { font-size: 1.5rem; }
        .error-card { padding: 40px 20px; }
      }
    </style>
  </head>
  <body>

     <div class="error-container">
      <div class="error-card">
        <div class="search-box">
           <i class="fas fa-search"></i>
        </div>
        <div class="error-code">
          404
          <i class="fas fa-pills floating-pill"></i>
        </div>
        <h1 class="error-title">Page Out of Stock!</h1>
        <p class="error-message">
          Oops! It seems the page you are looking for has been moved or disappeared from our inventory. 
          Don't worry, we can help you find your way back.
        </p>
        <a href="javascript:void(0)" onclick="window.history.length > 1 ? history.back() : window.location.href='index.html'" class="btn-back">
          <i class="fas fa-arrow-left"></i> Go Back
        </a>
      </div>
    </div>
  </body>
</html>
